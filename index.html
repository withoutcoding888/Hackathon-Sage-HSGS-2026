<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SageLA Math</title>
  <link rel="stylesheet" href="Design.css" />
</head>

<body>
  <aside class="sidebar" id="sidebar">
    <div class="side-block">
      <div class="side-item active" data-view="home">
        <div class="side-icon">⌂</div>
        <div class="side-text">Trang chủ</div>
      </div>
      <div class="side-item" data-view="theory">
        <div class="side-icon">📘</div>
        <div class="side-text">Lý thuyết toán</div>
      </div>
      <div class="side-item" data-view="testSetup">
        <div class="side-icon">📝</div>
        <div class="side-text">Tạo bài kiểm tra</div>
      </div>
      <div class="side-item" data-view="aiSetup">
        <div class="side-icon">✨</div>
        <div class="side-text">Bài từ AI</div>
      </div>
      <div class="side-item" data-view="scores">
        <div class="side-icon">🏆</div>
        <div class="side-text">Xem điểm</div>
      </div>
    </div>

    <div class="side-block">
      <div class="side-title">Chủ đề toán</div>
      <div class="side-item" data-topic="Vector">
        <div class="side-icon">➜</div>
        <div class="side-text">Vector</div>
      </div>
      <div class="side-item" data-topic="Ma trận">
        <div class="side-icon">▦</div>
        <div class="side-text">Ma trận</div>
      </div>
      <div class="side-item" data-topic="Định thức">
        <div class="side-icon">Δ</div>
        <div class="side-text">Định thức</div>
      </div>
      <div class="side-item" data-topic="Hệ phương trình">
        <div class="side-icon">≡</div>
        <div class="side-text">Hệ phương trình</div>
      </div>
      <div class="side-item" data-topic="Không gian vector">
        <div class="side-icon">◇</div>
        <div class="side-text">Không gian vector</div>
      </div>
      <div class="side-item" data-topic="Eigen">
        <div class="side-icon">λ</div>
        <div class="side-text">Eigenvalue</div>
      </div>
    </div>
  </aside>

  <main id="main">
    <nav class="chips">
      <button class="chip active" data-view="home">Tổng quan</button>
      <button class="chip" data-view="theory">Lý thuyết toán</button>
      <button class="chip" data-view="testSetup">Tạo bài kiểm tra</button>
      <button class="chip" data-view="aiSetup">Bài từ AI</button>
      <button class="chip" data-view="scores">Xem điểm</button>
    </nav>

    <div id="app"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="javascript.js"></script>
</body>
</html>
